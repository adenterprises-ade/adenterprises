<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AD ENTERPRISES - One Step All Solutions</title>
    <!-- Google Pure Font Only (Super Fast Loading) -->
    <link href="https://googleapis.com" rel="stylesheet">
    
    <style>
        :root {
            --primary: #0f172a;
            --accent: #2563eb;
            --text-dark: #1e293b;
            --text-light: #64748b;
            --bg-light: #f8fafc;
            --white: #ffffff;
            --success: #25d366;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            background-color: var(--bg-light);
            color: var(--text-dark);
            line-height: 1.6;
            padding-top: 70px;
        }

        /* Responsive Fixed Header Navbar */
        .navbar {
            background: var(--white);
            padding: 10px 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: fixed;
            width: 100%;
            top: 0;
            left: 0;
            z-index: 9999;
            box-shadow: 0 2px 15px rgba(0,0,0,0.06);
        }

        .logo-area {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        /* Fixed Brand Logo Size Inside Navbar */
        .brand-logo-img {
            width: 45px; 
            height: 45px;
            object-fit: cover;
            border-radius: 50%;
            border: 2px solid var(--primary);
            background: #f0f0f0;
        }

        .brand-name {
            font-size: 20px;
            font-weight: 700;
            color: var(--primary);
            letter-spacing: 0.5px;
        }

        .nav-links {
            display: flex;
            list-style: none;
            gap: 25px;
        }

        .nav-links a {
            text-decoration: none;
            color: var(--text-dark);
            font-weight: 500;
            font-size: 15px;
            transition: 0.3s;
        }

        .nav-links a:hover {
            color: var(--accent);
        }

        /* Premium Main Banner */
        .hero {
            background: linear-gradient(135px, rgba(15,23,42,0.95), rgba(37,99,235,0.85)), url('https://unsplash.com');
            background-size: cover;
            background-position: center;
            min-height: 60vh;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            color: var(--white);
            padding: 40px 20px;
        }

        .hero-content {
            max-width: 800px;
        }

        .hero-content h1 {
            font-size: 42px;
            font-weight: 700;
            margin-bottom: 15px;
            letter-spacing: 1px;
        }

        .hero-content p {
            font-size: 18px;
            margin-bottom: 30px;
            opacity: 0.9;
            font-weight: 300;
        }

        .btn-whatsapp {
            background: var(--success);
            color: var(--white);
            padding: 12px 35px;
            border-radius: 50px;
            text-decoration: none;
            font-weight: 600;
            display: inline-block;
            box-shadow: 0 4px 20px rgba(37,211,102,0.4);
            transition: 0.3s ease;
        }

        .btn-whatsapp:hover {
            transform: translateY(-3px);
            box-shadow: 0 6px 25px rgba(37,211,102,0.5);
        }

        /* Core Section Layouts */
        section {
            padding: 80px 5%;
            display: block;
            width: 100%;
        }

        .section-title {
            text-align: center;
            font-size: 28px;
            margin-bottom: 45px;
            color: var(--primary);
            font-weight: 700;
        }

        .section-title::after {
            content: '';
            display: block;
            width: 50px;
            height: 4px;
            background: var(--accent);
            margin: 12px auto 0;
            border-radius: 2px;
        }

        /* Services Responsive Card Grid */
        .services-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 30px;
        }

        .service-card {
            background: var(--white);
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 5px 25px rgba(0,0,0,0.04);
            transition: 0.3s ease;
            border: 1px solid #f1f5f9;
        }

        .service-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 12px 30px rgba(0,0,0,0.08);
        }

        .service-img {
            width: 100%;
            height: 190px;
            object-fit: cover;
        }

        .service-info {
            padding: 25px;
        }

        .service-info h3 {
            font-size: 19px;
            margin-bottom: 15px;
            color: var(--primary);
        }

        .service-info ul {
            list-style: none;
        }

        .service-info ul li {
            margin-bottom: 8px;
            font-size: 14px;
            color: var(--text-light);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .service-info ul li::before {
            content: "✓";
            color: var(--accent);
            font-weight: bold;
        }

        /* Standard Work Gallery Grid */
        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 20px;
        }

        .gallery-item {
            border-radius: 8px;
            overflow: hidden;
            height: 210px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.03);
        }

        .gallery-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: 0.4s ease;
        }

        .gallery-item:hover img {
            transform: scale(1.06);
        }

        /* Trust Review Containers */
        .reviews-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 25px;
        }

        .review-card {
            background: var(--white);
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.02);
            border: 1px solid #edf2f7;
        }

        .stars {
            color: #ffc107;
            margin-bottom: 12px;
            font-size: 18px;
        }

        .review-text {
            font-style: italic;
            color: var(--text-light);
            font-size: 14px;
            margin-bottom: 15px;
        }

        .reviewer-name {
            font-weight: 600;
            font-size: 14px;
            color: var(--primary);
        }

        /* Two-Column Contact System Layout */
        .contact-wrapper {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 40px;
        }

        .contact-box {
            background: var(--white);
            padding: 35px;
            border-radius: 12px;
            box-shadow: 0 5px 25px rgba(0,0,0,0.03);
            border: 1px solid #f1f5f9;
        }

        .info-item {
            margin-bottom: 25px;
        }

        .info-item h4 {
            font-size: 15px;
            color: var(--primary);
            margin-bottom: 5px;
            font-weight: 600;
        }

        .info-item p {
            color: var(--text-light);
            font-size: 14px;
        }

        .map-box iframe {
            width: 100%;
            height: 100%;
            min-height: 320px;
            border-radius: 12px;
            border: none;
            box-shadow: 0 5px 25px rgba(0,0,0,0.03);
        }

        /* Clean Footer Area */
        footer {
            background: var(--primary);
            color: var(--white);
            text-align: center;
            padding: 25px;
            font-size: 13px;
            letter-spacing: 0.5px;
        }

        /* Responsive Mobile Breakpoints */
        @media (max-width: 768px) {
            .nav-links { display: none; }
            .hero-content h1 { font-size: 32px; }
            .hero-content p { font-size: 15px; }
            section { padding: 60px 20px; }
            body { padding-top: 65px; }
        }
    </style>
</head>
<body>

    <!-- Header Navigation Bar Section -->
    <nav class="navbar">
        <div class="logo-area">
            <!-- Your Original Logo Image Configuration -->
            <img src="logo.png" alt="Logo" class="brand-logo-img">
            <span class="brand-name">AD ENTERPRISES</span>
        </div>
        <ul class="nav-links">
            <li><a href="#services">Services</a></li>
            <li><a href="#gallery">Gallery</a></li>
            <li><a href="#reviews">Reviews</a></li>
            <li><a href="#contact">Contact</a></li>
        </ul>
    </nav>

    <!-- Main Splash Banner Presentation -->
    <div class="hero">
        <div class="hero-content">
            <h1>AD ENTERPRISES</h1>
            <p>One Step All Solutions — Printing, Mobile Repairing, Electronics & Tour Packages</p>
            <a href="https://wa.me." class="btn-whatsapp" target="_blank">
                Inquiry Now
            </a>
        </div>
    </div>

    <!-- Core Services Cards Block -->
    <section id="services">
        <h2 class="section-title">Our Premium Services</h2>
