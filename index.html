<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AD Enterprises</title>

<style>
body{
margin:0;
font-family:Arial;
background:#f5f5f5;
}

/* HEADER */
header{
background:#111;
color:white;
padding:15px;
display:flex;
align-items:center;
justify-content:space-between;
}

header img{
height:50px;
border-radius:5px;
}

.hero{
background:url('https://images.unsplash.com/photo-1581091870622-1e7f0c3b5c4a') center/cover;
height:250px;
display:flex;
align-items:center;
justify-content:center;
color:white;
font-size:30px;
font-weight:bold;
}

/* SERVICES */
.container{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:15px;
padding:20px;
}

.card{
background:white;
padding:15px;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,0.1);
cursor:pointer;
transition:0.3s;
}

.card:hover{
transform:scale(1.03);
}

.card img{
width:100%;
height:150px;
object-fit:cover;
border-radius:10px;
}

/* BUTTONS */
.btn{
background:#111;
color:white;
padding:10px;
display:inline-block;
margin-top:10px;
border-radius:5px;
text-decoration:none;
}

/* POPUP */
.modal{
display:none;
position:fixed;
top:0;left:0;
width:100%;height:100%;
background:rgba(0,0,0,0.6);
justify-content:center;
align-items:center;
}

.modal-content{
background:white;
padding:20px;
width:300px;
border-radius:10px;
}

.close{
float:right;
cursor:pointer;
font-size:20px;
}

/* FORMS */
form{
background:white;
padding:20px;
margin:20px;
border-radius:10px;
}

input,textarea{
width:100%;
padding:10px;
margin:5px 0;
}
</style>
</head>

<body>

<header>
<img src="images/logo.png" alt="logo">
<h3>AD ENTERPRISES</h3>
</header>

<div class="hero">
ONE STOP SOLUTIONS
</div>

<!-- SERVICES -->
<div class="container">

<div class="card" onclick="openModal('Printing Press','Banner, Flex, Visiting Card, Poster Printing')">
<img src="https://images.unsplash.com/photo-1583947215259-38e31be8751f">
<h3>Printing Press</h3>
</div>

<div class="card" onclick="openModal('Mobile & Computer Repair','All mobile, laptop & PC repair services')">
<img src="https://images.unsplash.com/photo-1587825140708-dfaf72ae4b04">
<h3>Repair Service</h3>
</div>

<div class="card" onclick="openModal('Electronics','TV, Fan, Home Appliances Repair & Sales')">
<img src="https://images.unsplash.com/photo-1518770660439-4636190af475">
<h3>Electronics</h3>
</div>

<div class="card" onclick="openModal('Gadgets','Latest mobile & gadgets available')">
<img src="https://images.unsplash.com/photo-1510557880182-3d4d3cba35a5">
<h3>Gadgets</h3>
</div>

<div class="card" onclick="openModal('Parcel Service','Online parcel receive & delivery support')">
<img src="https://images.unsplash.com/photo-1586528116311-ad8dd3c8310d">
<h3>Parcel Service</h3>
</div>

<div class="card" onclick="openModal('Tourism','Tour packages & travel booking')">
<img src="https://images.unsplash.com/photo-1503220317375-aaad61436b1b">
<h3>Tourism</h3>
</div>

</div>

<!-- INQUIRY FORM -->
<form>
<h3>Inquiry Form</h3>
<input type="text" placeholder="Your Name">
<input type="text" placeholder="Mobile Number">
<textarea placeholder="Your Message"></textarea>
<button class="btn">Submit</button>
</form>

<!-- BOOKING FORM -->
<form>
<h3>Booking Form</h3>
<input type="text" placeholder="Service Name">
<input type="date">
<textarea placeholder="Details"></textarea>
<button class="btn">Book Now</button>
</form>

<!-- POPUP -->
<div class="modal" id="modal">
<div class="modal-content">
<span class="close" onclick="closeModal()">X</span>
<h3 id="title"></h3>
<p id="desc"></p>
</div>
</div>

<script>
function openModal(title,desc){
document.getElementById('modal').style.display="flex";
document.getElementById('title').innerText=title;
document.getElementById('desc').innerText=desc;
}

function closeModal(){
document.getElementById('modal').style.display="none";
}
</script>

</body>
</html>
