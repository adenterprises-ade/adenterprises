<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AD ENTERPRISES</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #f5f5f5;
}

/* HEADER */
header {
  background: url('images/header.jpg') center/cover no-repeat;
  color: white;
  text-align: center;
  padding: 60px 20px;
}

header h1 {
  font-size: 40px;
  background: rgba(0,0,0,0.5);
  display: inline-block;
  padding: 10px 20px;
  border-radius: 10px;
}

/* SECTION */
.section {
  padding: 20px;
  text-align: center;
}

.section h2 {
  margin-bottom: 15px;
}

/* CARDS */
.grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
  gap: 15px;
  padding: 10px;
}

.card {
  background: white;
  border-radius: 12px;
  overflow: hidden;
  box-shadow: 0 4px 10px rgba(0,0,0,0.1);
}

.card img {
  width: 100%;
  height: 180px;
  object-fit: cover;
}

.card h3 {
  margin: 10px 0;
}

.btn {
  display: inline-block;
  margin: 10px;
  padding: 8px 12px;
  background: green;
  color: white;
  text-decoration: none;
  border-radius: 6px;
}

/* GALLERY */
.gallery img {
  width: 100%;
  height: 150px;
  object-fit: cover;
  border-radius: 10px;
}

/* REVIEWS */
.review {
  background: white;
  margin: 10px;
  padding: 10px;
  border-radius: 10px;
  box-shadow: 0 2px 8px rgba(0,0,0,0.1);
}
</style>
</head>

<body>

<header>
  <h1>AD ENTERPRISES</h1>
</header>

<!-- SERVICES -->
<div class="section">
<h2>Our Services</h2>

<div class="grid">

  <!-- PRINTING / PAINTING -->
  <div class="card">
    <img src="https://images.unsplash.com/photo-1586281380349-632531db7ed4?w=600" alt="Printing Press">
    <h3>Printing Press</h3>
    <a class="btn" href="#">Inquiry</a>
  </div>

  <!-- MOBILE (3rd image style) -->
  <div class="card">
    <img src="https://images.unsplash.com/photo-1511707171634-5f897ff02aa9?w=600" alt="Mobile">
    <h3>Mobile Repair</h3>
    <a class="btn" href="#">Inquiry</a>
  </div>

  <!-- ELECTRONICS (HEADPHONE) -->
  <div class="card">
    <img src="https://images.unsplash.com/photo-1518441902117-f0a4a3a8c6a3?w=600" alt="Headphones">
    <h3>Electronics</h3>
    <a class="btn" href="#">Inquiry</a>
  </div>

  <!-- PARCEL -->
  <div class="card">
    <img src="https://images.unsplash.com/photo-1586528116311-ad8dd3c8310d?w=600" alt="Parcel Box">
    <h3>Parcel Service</h3>
    <a class="btn" href="#">Inquiry</a>
  </div>

</div>
</div>

<!-- GALLERY -->
<div class="section">
<h2>Gallery</h2>
<div class="grid gallery">

  <img src="https://images.unsplash.com/photo-1521737604893-d14cc237f11d?w=600">
  <img src="https://images.unsplash.com/photo-1497366216548-37526070297c?w=600">
  <img src="https://images.unsplash.com/photo-1500530855697-b586d89ba3ee?w=600">

</div>
</div>

<!-- REVIEWS -->
<div class="section">
<h2>Customer Reviews</h2>

<div class="review">
⭐⭐⭐⭐⭐ <br>
Good service and fast delivery!
</div>

<div class="review">
⭐⭐⭐⭐⭐ <br>
Very nice printing quality.
</div>

<div class="review">
⭐⭐⭐⭐ <br>
Affordable and trusted shop.
</div>

</div>

</body>
</html>
